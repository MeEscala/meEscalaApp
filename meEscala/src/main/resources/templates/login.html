<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{layoutbase :: head}"></head>

<body class="bg-background text-on-surface font-body-md min-h-screen flex antialiased">
    
    <nav th:replace="~{layoutbase :: sidenav(menuAtivo='NOME_DO_MENU')}"></nav>
    
    <div class="flex-1 flex flex-col md:ml-64 min-w-0">
        
        <header class="sticky top-0 z-50 flex md:hidden items-center justify-between px-margin-mobile w-full h-16 bg-surface border-b border-outline-variant text-primary shadow-none">
            <div class="font-headline-md text-headline-md font-bold text-primary">Me Escala</div>
        </header>

        <main class="flex-1 p-margin-mobile md:p-margin-desktop bg-surface flex flex-col items-center justify-center">
            
            <div class="text-center flex flex-col items-center gap-4 p-8 bg-surface-container-lowest border border-outline-variant rounded-xl shadow-sm max-w-md w-full">
                
                <span class="material-symbols-outlined text-[64px] text-primary opacity-80">
                    engineering
                </span>
                
                <h2 class="font-headline-lg text-headline-lg text-on-surface font-bold">
                    TELA EM CONSTRUÇÃO
                </h2>
                
                <p class="font-body-md text-body-md text-on-surface-variant">
                    A interface e a lógica de negócio desta área serão implementadas na próxima etapa de desenvolvimento.
                </p>
                
                <a th:href="@{/dashboard}" class="mt-4 px-6 py-2 bg-primary text-on-primary font-label-md text-label-md rounded-full hover:bg-surface-tint shadow-sm transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Voltar ao Painel
                </a>
                
            </div>
            
        </main>
        
        <footer th:replace="~{layoutbase :: footer}"></footer>
        
    </div>
</body>
</html>
