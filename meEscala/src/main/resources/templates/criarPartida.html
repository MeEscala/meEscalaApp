<!DOCTYPE html>
<html lang="pt-BR" xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">

<head th:replace="layoutbase :: head"></head>

<body class="bg-background text-on-surface font-body-md min-h-screen flex antialiased">
    <nav th:fragment="sidenav">placeholder</nav>
    <div class="flex-1 flex flex-col md:ml-64 min-w-0">
        <header th:fragment="topnav"
            class="sticky top-0 z-50 flex md:hidden items-center justify-between px-margin-mobile w-full h-16 bg-surface border-b border-outline-variant text-primary shadow-none">
            <div class="font-headline-md text-headline-md font-bold text-primary">Me Escala</div>
            <div class="flex items-center gap-sm">
                <button
                    class="p-xs text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined">notifications</span>
                </button>
                <button
                    class="p-xs text-on-surface-variant hover:bg-surface-container-low transition-colors active:scale-95 rounded-full flex items-center justify-center">
                    <span class="material-symbols-outlined">account_circle</span>
                </button>
            </div>
        </header>
        <main th:fragment="canvas"
            class="flex-1 p-margin-mobile md:p-margin-desktop bg-surface flex flex-col items-center">
            <div class="w-full max-w-3xl">
                <div class="mb-lg">
                    <h2
                        class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-surface mb-xs">
                        Organizar Partida</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant">Defina os detalhes e convide jogadores
                        para o seu evento.</p>
                </div>
                <div class="flex items-center w-full mb-xl">
                    <div class="flex flex-col items-center relative z-10">
                        <div
                            class="w-6 h-6 rounded-full bg-secondary-container flex items-center justify-center ring-4 ring-surface">
                            <div class="w-2 h-2 rounded-full bg-surface"></div>
                        </div>
                        <span
                            class="absolute top-8 font-label-sm text-label-sm text-on-surface whitespace-nowrap">Detalhes</span>
                    </div>
                    <div class="flex-1 h-[2px] bg-outline-variant -mx-2 z-0"></div>
                    <div class="flex flex-col items-center relative z-10">
                        <div
                            class="w-6 h-6 rounded-full bg-surface border-2 border-outline-variant flex items-center justify-center ring-4 ring-surface">
                        </div>
                        <span
                            class="absolute top-8 font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Escalação</span>
                    </div>
                    <div class="flex-1 h-[2px] bg-outline-variant -mx-2 z-0"></div>
                    <div class="flex flex-col items-center relative z-10">
                        <div
                            class="w-6 h-6 rounded-full bg-surface border-2 border-outline-variant flex items-center justify-center ring-4 ring-surface">
                        </div>
                        <span
                            class="absolute top-8 font-label-sm text-label-sm text-on-surface-variant whitespace-nowrap">Publicar</span>
                    </div>
                </div>
                <form
                    class="bg-surface-container-lowest border border-outline-variant rounded-lg p-md md:p-lg shadow-sm">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
                        <div class="md:col-span-2 flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="match-title">TÍTULO DA PARTIDA</label>
                            <input
                                class="w-full border border-outline bg-surface-container-lowest p-sm text-body-md text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow placeholder:text-on-surface-variant/50"
                                id="match-title" placeholder="ex. Final da Liga de Domingo" type="text" />
                        </div>
                        <div class="flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="sport-type">TIPO DE ESPORTE</label>
                            <div class="relative">
                                <select
                                    class="w-full border border-outline bg-surface-container-lowest p-sm pr-lg text-body-md text-on-surface rounded-DEFAULT appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary cursor-pointer"
                                    id="sport-type">
                                    <option disabled="" selected="" value="">Selecione o esporte</option>
                                    <option value="soccer">Futebol (11x11)</option>
                                    <option value="futsal">Futsal (5x5)</option>
                                    <option value="basketball">Basquete</option>
                                    <option value="tennis">Tênis (Duplas)</option>
                                </select>
                                <span
                                    class="material-symbols-outlined absolute right-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="max-players">MÁX. JOGADORES</label>
                            <input
                                class="w-full border border-outline bg-surface-container-lowest p-sm text-body-md text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow placeholder:text-on-surface-variant/50"
                                id="max-players" max="100" min="2" placeholder="22" type="number" />
                        </div>
                        <div class="flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="match-date">DATA</label>
                            <div class="relative">
                                <input
                                    class="w-full border border-outline bg-surface-container-lowest p-sm pl-xl text-body-md text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow"
                                    id="match-date" type="date" />
                                <span
                                    class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">calendar_today</span>
                            </div>
                        </div>
                        <div class="flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="match-time">HORA</label>
                            <div class="relative">
                                <input
                                    class="w-full border border-outline bg-surface-container-lowest p-sm pl-xl text-body-md text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow"
                                    id="match-time" type="time" />
                                <span
                                    class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">schedule</span>
                            </div>
                        </div>
                        <div class="md:col-span-2 flex flex-col gap-xs">
                            <label
                                class="font-label-md text-label-md text-on-surface uppercase font-headline-md tracking-wide text-[12px]"
                                for="match-location">LOCALIZAÇÃO</label>
                            <div class="relative">
                                <input
                                    class="w-full border border-outline bg-surface-container-lowest p-sm pl-xl text-body-md text-on-surface rounded-DEFAULT focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-shadow placeholder:text-on-surface-variant/50"
                                    id="match-location" placeholder="Pesquise o local ou endereço" type="text" />
                                <span
                                    class="material-symbols-outlined absolute left-sm top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">location_on</span>
                            </div>
                        </div>
                    </div>
                    <div
                        class="mt-lg pt-md border-t border-outline-variant flex flex-col-reverse md:flex-row justify-end gap-sm">
                        <button
                            class="px-md py-sm font-label-md text-label-md text-on-surface hover:bg-surface-container-low rounded-DEFAULT transition-colors"
                            type="button">
                            Cancelar
                        </button>
                        <button
                            class="px-lg py-sm bg-primary text-on-primary font-label-md text-label-md rounded-DEFAULT hover:bg-surface-tint shadow-sm transition-colors flex items-center justify-center gap-xs"
                            type="button">
                            Continuar para Escalação
                            <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                        </button>
                    </div>
                </form>
            </div>
        </main>
        <footer th:fragment="footer"
            class="w-full py-md px-margin-mobile md:px-margin-desktop flex flex-col md:flex-row justify-between items-center gap-sm border-t border-outline-variant bg-surface-container-lowest">
            <div
                class="font-headline-md text-headline-md text-primary opacity-80 hover:opacity-100 transition-opacity cursor-pointer text-sm">
                © 2026 Sistema de Organização Me Escala
            </div>
            <div class="flex flex-wrap justify-center gap-md">
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Support</a>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Privacy Policy</a>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Terms of Service</a>
                <a class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors"
                    href="#">Tournament Rules</a>
            </div>
        </footer>
    </div>
</body>

</html>
